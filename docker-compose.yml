services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: legalease
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - legalease_db:/var/lib/postgresql/data

  libretranslate:
    image: libretranslate/libretranslate
    ports:
      - "5000:5000"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/legalease
      LIBRETRANSLATE_URL: http://libretranslate:5000/translate
      LLM_ENABLED: "0"
    ports:
      - "8000:8000"
    depends_on:
      - db
      - libretranslate

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  legalease_db:
